<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>SH-CONTACT · จัดการพนักงาน</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <!-- AOS -->
    <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet" />
    <style>
        :root {
            --bg-0: #0b0f17;
            --surface: rgba(255,255,255,0.045);
            --surface-2: rgba(255,255,255,0.07);
            --border: rgba(255,255,255,0.09);
            --border-soft: rgba(255,255,255,0.06);
            --text-1: #eef1f7;
            --text-2: #98a2b8;
            --text-3: #6b7589;
            --accent: #6e8bff;
            --accent-grad: linear-gradient(135deg, #6e8bff, #8b6cf0);
            --green: #34d399;
            --green-grad: linear-gradient(135deg, #34d399, #16a374);
            --orange-grad: linear-gradient(135deg, #fbbf24, #ea8a14);
            --red: #f87171;
            --blue: #60a5fa;
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 12px;
            --shadow-deep: 0 30px 60px -20px rgba(0,0,0,0.6);
        }
        * { box-sizing: border-box; }
        html, body { background: var(--bg-0); }
        body {
            font-family: 'Kanit', sans-serif;
            background:
                radial-gradient(circle at 12% 8%, rgba(110,139,255,0.16), transparent 45%),
                radial-gradient(circle at 88% 92%, rgba(139,108,240,0.14), transparent 45%),
                var(--bg-0);
            min-height: 100vh;
            padding: 28px 16px;
            margin: 0;
            color: var(--text-1);
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }
        .card-main {
            background: var(--surface);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-deep), 0 0 0 1px rgba(255,255,255,0.02) inset;
            padding: 28px 26px;
            max-width: 1320px;
            width: 100%;
        }
        @media (max-width: 640px) { .card-main { padding: 18px 14px; border-radius: 20px; } }

        .header-wrap { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 8px; }
        .header-icon {
            background: var(--accent-grad);
            width: 52px; height: 52px;
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; color: #fff;
            box-shadow: 0 10px 24px -8px rgba(110,139,255,0.5);
            flex-shrink: 0;
        }
        .header-text h3 {
            font-weight: 600; font-size: 1.4rem; color: var(--text-1); margin: 0; line-height: 1.3;
            display: flex; align-items: center; flex-wrap: wrap; gap: 8px;
        }
        .header-text .sub-title { color: var(--text-2); font-size: 0.83rem; font-weight: 400; margin: 2px 0 0; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(96px, 1fr)); gap: 10px; margin: 20px 0; }
        .stat-item {
            background: var(--surface-2);
            border-radius: var(--radius-sm);
            padding: 14px 6px;
            text-align: center;
            border: 1px solid var(--border-soft);
            transition: transform 0.2s, border-color 0.2s;
        }
        .stat-item:hover { transform: translateY(-2px); border-color: var(--border); }
        .stat-number { font-size: 1.5rem; font-weight: 700; line-height: 1.2; color: var(--text-1); font-feature-settings: "tnum"; }
        .stat-label { font-size: 0.66rem; font-weight: 500; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.4px; margin-top: 2px; }
        .stat-item.total .stat-number { color: #fff; }
        .stat-item.prod .stat-number { color: var(--blue); }
        .stat-item.qc .stat-number { color: var(--green); }
        .stat-item.tech .stat-number { color: #fb923c; }
        .stat-item.other .stat-number { color: #c084fc; }

        .toolbar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; align-items: center; }
        .toolbar .search-box { flex: 1 1 240px; position: relative; }
        .toolbar .search-box input {
            width: 100%;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border);
            padding: 11px 16px 11px 42px;
            font-size: 0.92rem;
            background: rgba(255,255,255,0.04);
            color: var(--text-1);
            transition: all 0.2s ease;
            font-family: 'Kanit', sans-serif;
            outline: none;
        }
        .toolbar .search-box input::placeholder { color: var(--text-3); }
        .toolbar .search-box input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(110,139,255,0.14);
            background: rgba(255,255,255,0.06);
        }
        .toolbar .search-box i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-3); font-size: 1.05rem; }
        .toolbar .filter-group { display: flex; flex-wrap: wrap; gap: 6px; }
        .toolbar .filter-group .badge-filter {
            background: rgba(255,255,255,0.03);
            border: 1.5px solid var(--border);
            border-radius: 30px;
            padding: 7px 16px;
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--text-2);
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Kanit', sans-serif;
            user-select: none;
        }
        .toolbar .filter-group .badge-filter:hover { background: rgba(110,139,255,0.1); border-color: var(--accent); color: var(--text-1); }
        .toolbar .filter-group .badge-filter.active {
            background: var(--accent-grad); color: #fff; border-color: transparent;
            box-shadow: 0 4px 14px rgba(110,139,255,0.3);
        }
        .btn-add, .btn-reset {
            border: none; border-radius: 30px; padding: 9px 20px; color: #fff;
            font-weight: 500; font-size: 0.82rem; font-family: 'Kanit', sans-serif;
            transition: all 0.2s; cursor: pointer;
            display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
        }
        .btn-add { background: var(--green-grad); box-shadow: 0 4px 16px rgba(52,211,153,0.25); }
        .btn-add:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(52,211,153,0.35); }
        .btn-reset { background: var(--orange-grad); box-shadow: 0 4px 16px rgba(251,191,36,0.2); }
        .btn-reset:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(251,191,36,0.3); }

        .table-wrap {
            overflow-x: auto;
            border-radius: var(--radius-md);
            background: rgba(255,255,255,0.025);
            border: 1px solid var(--border-soft);
            padding: 4px 0;
            position: relative;
        }
        .table-wrap::-webkit-scrollbar { height: 8px; }
        .table-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 8px; }
        .table {
            margin: 0; font-size: 0.88rem; font-family: 'Kanit', sans-serif;
            border-collapse: separate; border-spacing: 0;
            width: 100%; min-width: 750px; color: var(--text-1);
        }
        .table thead th {
            background: rgba(110,139,255,0.06);
            color: var(--text-2);
            font-weight: 600;
            padding: 14px 12px;
            border-bottom: 1px solid var(--border);
            font-size: 0.74rem;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            white-space: nowrap;
            position: sticky; top: 0; z-index: 2;
        }
        .table tbody td {
            padding: 12px 12px;
            border-bottom: 1px solid var(--border-soft);
            vertical-align: middle;
            color: var(--text-1);
            background-color: transparent;
        }
        .table tbody tr:hover td { background: rgba(110,139,255,0.05); }
        .table tbody tr:last-child td { border-bottom: none; }

        /* --- Sticky คอลัมน์จัดการ (คอลัมน์สุดท้าย) --- */
        .table thead th:last-child,
        .table tbody td:last-child { position: sticky; right: 0; z-index: 5; background: #141a26; }
        .table thead th:last-child { z-index: 6; background: #16203a; border-left: 1px solid var(--border); }
        .table tbody td:last-child { box-shadow: -8px 0 16px rgba(0,0,0,0.35); border-left: 1px solid var(--border-soft); }
        .table tbody tr:hover td:last-child { background: #182236; }

        .badge-position { display: inline-block; padding: 3px 12px; border-radius: 30px; font-size: 0.68rem; font-weight: 500; white-space: nowrap; border: 1px solid transparent; }
        .badge-position.supervisor  { background: rgba(96,165,250,0.12);  color: #7eb6fb; border-color: rgba(96,165,250,0.25); }
        .badge-position.production  { background: rgba(45,212,191,0.12);  color: #5eead4; border-color: rgba(45,212,191,0.25); }
        .badge-position.qc          { background: rgba(52,211,153,0.12);  color: #6ee7b7; border-color: rgba(52,211,153,0.25); }
        .badge-position.technician  { background: rgba(248,113,113,0.12); color: #fca5a5; border-color: rgba(248,113,113,0.25); }
        .badge-position.maintenance { background: rgba(192,132,252,0.12); color: #d8b4fe; border-color: rgba(192,132,252,0.25); }
        .badge-position.driver      { background: rgba(251,191,36,0.12);  color: #fcd34d; border-color: rgba(251,191,36,0.25); }
        .badge-position.delivery    { background: rgba(251,191,36,0.12);  color: #fcd34d; border-color: rgba(251,191,36,0.25); }
        .badge-position.warehouse   { background: rgba(96,165,250,0.12);  color: #93c5fd; border-color: rgba(96,165,250,0.25); }
        .badge-position.housekeeper { background: rgba(248,113,113,0.12); color: #fca5a5; border-color: rgba(248,113,113,0.25); }
        .badge-group {
            display: inline-block; padding: 3px 10px; border-radius: 30px; font-size: 0.68rem; font-weight: 500;
            background: rgba(255,255,255,0.05); color: var(--text-2); white-space: nowrap;
        }
        .text-phone { font-weight: 500; color: var(--text-1); letter-spacing: 0.3px; white-space: nowrap; }
        .text-id { font-size: 0.78rem; color: var(--text-3); font-weight: 400; font-feature-settings: "tnum"; white-space: nowrap; }

        /* Action buttons */
        .action-group { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
        .action-btn {
            background: none; border: none; padding: 6px 10px; border-radius: 30px;
            transition: all 0.2s; font-size: 1.15rem;
            display: inline-flex; align-items: center; justify-content: center;
            min-width: 40px; min-height: 40px;
        }
        .action-btn.call { background: rgba(52,211,153,0.12); color: var(--green); font-size: 1.25rem; }
        .action-btn.call:hover { background: var(--green); color: #06281b; transform: scale(1.05); }
        .action-btn.edit { color: var(--accent); }
        .action-btn.edit:hover { background: rgba(110,139,255,0.15); transform: scale(1.05); }
        .action-btn.delete { color: var(--red); }
        .action-btn.delete:hover { background: rgba(248,113,113,0.15); transform: scale(1.05); }
        @media (max-width: 576px) {
            .action-btn { padding: 8px 12px; font-size: 1.35rem; min-width: 48px; min-height: 48px; }
            .action-btn.call { font-size: 1.55rem; }
            .table tbody td { padding: 10px 6px; }
            .action-group { gap: 4px; }
        }

        .empty-state { text-align: center; padding: 36px 16px; color: var(--text-3); }
        .empty-state i { font-size: 2.2rem; display: block; margin-bottom: 8px; color: var(--text-3); opacity: 0.6; }

        /* Modal */
        .modal-content { border-radius: var(--radius-lg); border: 1px solid var(--border); background: #131826; box-shadow: var(--shadow-deep); color: var(--text-1); }
        .modal-header { border-bottom: 1px solid var(--border-soft); padding: 20px 24px; }
        .modal-header .btn-close { filter: invert(1) grayscale(1) brightness(1.6); opacity: 0.7; }
        .modal-title { font-weight: 600; font-size: 1.05rem; display: flex; align-items: center; gap: 8px; }
        .modal-body { padding: 20px 24px; }
        .modal-footer { border-top: 1px solid var(--border-soft); padding: 16px 24px; }
        .form-label { color: var(--text-2); font-size: 0.84rem; font-weight: 500; margin-bottom: 6px; }
        .form-control, .form-select {
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border);
            padding: 10px 14px;
            font-family: 'Kanit', sans-serif;
            background: rgba(255,255,255,0.04);
            color: var(--text-1);
        }
        .form-control::placeholder { color: var(--text-3); }
        .form-control:focus, .form-select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(110,139,255,0.14);
            background: rgba(255,255,255,0.06);
            color: var(--text-1);
        }
        .form-select option { background: #131826; color: var(--text-1); }
        .btn-primary {
            background: var(--accent-grad); border: none; border-radius: 30px;
            padding: 9px 24px; font-weight: 500; font-family: 'Kanit', sans-serif;
            box-shadow: 0 4px 16px rgba(110,139,255,0.3);
        }
        .btn-primary:hover, .btn-primary:focus { box-shadow: 0 6px 20px rgba(110,139,255,0.4); }
        .btn-secondary {
            border-radius: 30px; padding: 9px 24px; font-family: 'Kanit', sans-serif;
            background: rgba(255,255,255,0.06); border: 1px solid var(--border); color: var(--text-2);
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); color: var(--text-1); }

        @media (max-width: 480px) {
            .table { font-size: 0.8rem; min-width: 600px; }
            .table thead th, .table tbody td { padding: 8px 4px; }
            .stats-grid { grid-template-columns: repeat(3, 1fr); }
            .stat-number { font-size: 1.25rem; }
            .header-text h3 { font-size: 1.2rem; }
        }

        .upload-badge {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 4px 14px; border-radius: 30px; font-size: 0.68rem; font-weight: 500;
            border: 1px solid transparent; white-space: nowrap;
        }
        .upload-badge.synced  { background: rgba(52,211,153,0.12); color: #6ee7b7; border-color: rgba(52,211,153,0.25); }
        .upload-badge.pending { background: rgba(251,191,36,0.12); color: #fcd34d; border-color: rgba(251,191,36,0.25); }
        .upload-badge.error   { background: rgba(248,113,113,0.12); color: #fca5a5; border-color: rgba(248,113,113,0.25); }

        .loader-dots { display: inline-flex; gap: 4px; align-items: center; }
        .loader-dots span { width: 6px; height: 6px; border-radius: 50%; background: currentColor; animation: dotBounce 1.2s infinite ease-in-out both; }
        .loader-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loader-dots span:nth-child(2) { animation-delay: -0.16s; }
        .loader-dots span:nth-child(3) { animation-delay: 0s; }
        @keyframes dotBounce { 0%, 80%, 100% { transform: scale(0); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

        /* SweetAlert2 dark theme override */
        .swal2-popup { background: #131826 !important; color: var(--text-1) !important; border-radius: var(--radius-lg) !important; }
        .swal2-html-container, .swal2-title { color: var(--text-1) !important; }
    </style>
</head>
<body>

<div class="card-main" data-aos="fade-up" data-aos-duration="600">
    <!-- Header -->
    <div class="header-wrap" data-aos="fade-up" data-aos-delay="100">
        <div class="header-icon">
            <i class="bi bi-people-fill"></i>
        </div>
        <div class="header-text">
            <h3>จัดการพนักงาน <span id="syncStatus" class="upload-badge pending"><i class="bi bi-arrow-repeat"></i> กำลังโหลด...</span></h3>
            <div class="sub-title">SH-CONTACT · เพิ่ม แก้ไข ลบ ข้อมูลบุคลากร <span id="totalLabel"></span></div>
        </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid" data-aos="fade-up" data-aos-delay="150">
        <div class="stat-item total"><div class="stat-number" id="statTotal">0</div><div class="stat-label">ทั้งหมด</div></div>
        <div class="stat-item prod"><div class="stat-number" id="statProd">0</div><div class="stat-label">ผลิต</div></div>
        <div class="stat-item qc"><div class="stat-number" id="statQC">0</div><div class="stat-label">QC</div></div>
        <div class="stat-item tech"><div class="stat-number" id="statTech">0</div><div class="stat-label">ช่าง</div></div>
        <div class="stat-item other"><div class="stat-number" id="statOther">0</div><div class="stat-label">อื่น ๆ</div></div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar" data-aos="fade-up" data-aos-delay="200">
        <div class="search-box">
            <i class="bi bi-search"></i>
            <input type="text" id="searchInput" placeholder="ค้นหาชื่อ, รหัส, ตำแหน่ง..." />
        </div>
        <div class="filter-group" id="filterGroup">
            <span class="badge-filter active" data-filter="all">ทั้งหมด</span>
            <span class="badge-filter" data-filter="หัวหน้ากะ">หัวหน้ากะ</span>
            <span class="badge-filter" data-filter="พนักงานผลิต">ผลิต</span>
            <span class="badge-filter" data-filter="QC">QC</span>
            <span class="badge-filter" data-filter="ช่างเทคนิค">ช่างเทคนิค</span>
            <span class="badge-filter" data-filter="อื่นๆ">อื่นๆ</span>
        </div>
        <button class="btn-add" data-bs-toggle="modal" data-bs-target="#employeeModal">
            <i class="bi bi-plus-circle"></i> เพิ่มพนักงาน
        </button>
        <button class="btn-reset" id="resetBtn">
            <i class="bi bi-arrow-counterclockwise"></i> รีเซ็ทพนักงาน
        </button>
    </div>

    <!-- Table -->
    <div class="table-wrap" data-aos="fade-up" data-aos-delay="250">
        <table class="table">
            <thead>
                <tr>
                    <th style="width:50px;">#</th>
                    <th style="min-width:120px;">รหัส</th>
                    <th style="min-width:140px;">ชื่อ-สกุล</th>
                    <th style="min-width:110px;">ตำแหน่ง</th>
                    <th style="min-width:80px;">กลุ่มงาน</th>
                    <th style="min-width:120px;">เบอร์โทร</th>
                    <th style="min-width:140px;">จัดการ</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="7" class="empty-state"><i class="bi bi-hourglass-split"></i> กำลังโหลดข้อมูล...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- Footer -->
    <div style="margin-top:16px; font-size:0.75rem; color:#a0aec0; text-align:center; border-top:1px solid rgba(0,0,0,0.04); padding-top:14px;" data-aos="fade-up" data-aos-delay="300">
        <i class="bi bi-database"></i> ข้อมูลถูกจัดเก็บใน Firebase Realtime Database
        <span id="syncTime" style="margin-left:10px;"></span>
    </div>
</div>

<!-- Modal for Add/Edit -->
<div class="modal fade" id="employeeModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle"><i class="bi bi-person-plus"></i> เพิ่มพนักงาน</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="employeeForm">
                    <input type="hidden" id="editKey" value="" />
                    <div class="mb-3">
                        <label class="form-label">รหัสพนักงาน</label>
                        <input type="text" class="form-control" id="inputId" placeholder="เช่น 680303001" required />
                    </div>
                    <div class="mb-3">
                        <label class="form-label">ชื่อ-สกุล</label>
                        <input type="text" class="form-control" id="inputName" placeholder="ชื่อ นามสกุล" required />
                    </div>
                    <div class="mb-3">
                        <label class="form-label">ตำแหน่ง</label>
                        <select class="form-select" id="inputPosition" required>
                            <option value="">เลือกตำแหน่ง</option>
                            <option>หัวหน้ากะ</option>
                            <option>พนักงานผลิต</option>
                            <option>QC</option>
                            <option>ช่างเทคนิค</option>
                            <option>ช่างซ่อมบำรุง</option>
                            <option>พนักงานขับรถ</option>
                            <option>พนักงานจัดส่ง</option>
                            <option>พนักงานคลังสินค้า</option>
                            <option>แม่บ้าน</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">กลุ่มงาน</label>
                        <select class="form-select" id="inputGroup" required>
                            <option value="ไม่ระบุ">ไม่ระบุ</option>
                            <option>กะ A</option>
                            <option>กะ B</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">เบอร์โทร</label>
                        <input type="text" class="form-control" id="inputPhone" placeholder="062-196-6115" required />
                    </div>
                </form>
            </div>
            <div class="modal-footer">

    // ----- Helpers -----
    function getPositionClass(pos) {
        const map = {
            'หัวหน้ากะ': 'supervisor',
            'พนักงานผลิต': 'production',
            'QC': 'qc',
            'ช่างเทคนิค': 'technician',
            'ช่างซ่อมบำรุง': 'maintenance',
            'พนักงานขับรถ': 'driver',
            'พนักงานจัดส่ง': 'delivery',
            'พนักงานคลังสินค้า': 'warehouse',
            'แม่บ้าน': 'housekeeper'
        };
        return map[pos] || '';
    }

    function getPositionShort(pos) {
        const map = {
            'หัวหน้ากะ': 'หัวหน้ากะ',
            'พนักงานผลิต': 'ผลิต',
            'QC': 'QC',
            'ช่างเทคนิค': 'ช่างเทคนิค',
            'ช่างซ่อมบำรุง': 'ซ่อมบำรุง',
            'พนักงานขับรถ': 'ขับรถ',
            'พนักงานจัดส่ง': 'จัดส่ง',
            'พนักงานคลังสินค้า': 'คลังสินค้า',
            'แม่บ้าน': 'แม่บ้าน'
        };
        return map[pos] || pos;
    }

    function getCategory(pos) {
        if (pos === 'หัวหน้ากะ') return 'หัวหน้ากะ';
        if (pos === 'พนักงานผลิต') return 'พนักงานผลิต';
        if (pos === 'QC') return 'QC';
        if (pos === 'ช่างเทคนิค' || pos === 'ช่างซ่อมบำรุง') return 'ช่างเทคนิค';
        return 'อื่นๆ';
    }

    // ----- Render -----
    function renderTable(data) {
        if (!data || data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="7" class="empty-state"><i class="bi bi-inbox"></i><div>ไม่พบข้อมูล</div></td></tr>`;
            return;
        }
        let html = '';
        data.forEach((emp, idx) => {
            const posClass = getPositionClass(emp.position);
            const posShort = getPositionShort(emp.position);
            const groupDisplay = emp.group && emp.group.trim() !== '' ? emp.group : '—';
            html += `
                <tr>
                    <td style="font-weight:500;color:#718096;">${idx + 1}</td>
                    <td class="text-id">${emp.id}</td>
                    <td style="font-weight:500;">${emp.name}</td>
                    <td><span class="badge-position ${posClass}">${posShort}</span></td>
                    <td><span class="badge-group">${groupDisplay}</span></td>
                    <td class="text-phone">${emp.phone}</td>
                    <td>
                        <div class="action-group">
                            <button class="action-btn call" data-phone="${emp.phone}" title="โทร"><i class="bi bi-telephone-fill"></i></button>
                            <button class="action-btn edit" data-key="${emp.key}" data-bs-toggle="modal" data-bs-target="#employeeModal" title="แก้ไข"><i class="bi bi-pencil-square"></i></button>
                            <button class="action-btn delete" data-key="${emp.key}" title="ลบ"><i class="bi bi-trash3"></i></button>
                        </div>
                    </td>
                </tr>
            `;
        });
        tbody.innerHTML = html;

        // Event: Call
        tbody.querySelectorAll('.call').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const phone = btn.dataset.phone.replace(/-/g, '');
                if (phone) {
                    window.location.href = `tel:${phone}`;
                }
            });
        });

        // Event: Delete
        tbody.querySelectorAll('.delete').forEach(btn => {
            btn.addEventListener('click', () => deleteEmployee(btn.dataset.key));
        });
    }

    // Update stats
    function updateStats(data) {
        const total = data.length;
        const prod = data.filter(e => e.position === 'พนักงานผลิต').length;
        const qc = data.filter(e => e.position === 'QC').length;
        const tech = data.filter(e => e.position === 'ช่างเทคนิค' || e.position === 'ช่างซ่อมบำรุง').length;
        const other = total - prod - qc - tech;
        statTotal.textContent = total;
        statProd.textContent = prod;
        statQC.textContent = qc;
        statTech.textContent = tech;
        statOther.textContent = other;
        totalLabel.textContent = `(${total} คน)`;
    }

    // ----- Filter & Search -----
    function filterData() {
        let filtered = allEmployees;
        if (currentFilter !== 'all') {
            if (currentFilter === 'อื่นๆ') {
                filtered = filtered.filter(e => {
                    const cat = getCategory(e.position);
                    return cat !== 'หัวหน้ากะ' && cat !== 'พนักงานผลิต' && cat !== 'QC' && cat !== 'ช่างเทคนิค';
                });
            } else if (currentFilter === 'หัวหน้ากะ') {
                filtered = filtered.filter(e => e.position === 'หัวหน้ากะ');
            } else if (currentFilter === 'พนักงานผลิต') {
                filtered = filtered.filter(e => e.position === 'พนักงานผลิต');
            } else if (currentFilter === 'QC') {
                filtered = filtered.filter(e => e.position === 'QC');
            } else if (currentFilter === 'ช่างเทคนิค') {
                filtered = filtered.filter(e => e.position === 'ช่างเทคนิค' || e.position === 'ช่างซ่อมบำรุง');
            }
        }
        if (currentSearch.trim() !== '') {
            const q = currentSearch.trim().toLowerCase();
            filtered = filtered.filter(e =>
                e.name.toLowerCase().includes(q) ||
                e.id.toLowerCase().includes(q) ||
                e.position.toLowerCase().includes(q) ||
                e.group.toLowerCase().includes(q) ||
                e.phone.includes(q)
            );
        }
        renderTable(filtered);
        updateStats(filtered);
    }

                timer: 2000,
                showConfirmButton: false
            });
        } catch (err) {

                text: err.message || 'กรุณาลองอีกครั้ง',
                confirmButtonColor: '#e53e3e'
            });
        }

    async function deleteEmployee(key) {
        const emp = allEmployees.find(e => e.key === key);

        const result = await Swal.fire({
            title: 'ยืนยันการลบ',
            text: `คุณต้องการลบ ${emp.name} (${emp.id}) ใช่หรือไม่?`,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#e53e3e',
            cancelButtonColor: '#6c757d',
            confirmButtonText: 'ลบ',
            cancelButtonText: 'ยกเลิก'

        if (!result.isConfirmed) return;

        try {
            await remove(ref(db, `employees/${key}`));

                icon: 'success',

    // ----- Modal handlers -----
    function openEditModal(emp) {

        inputId.value = emp.id;
        inputName.value = emp.name;
        inputPosition.value = emp.position;
        inputGroup.value = emp.group || 'ไม่ระบุ';
        inputPhone.value = emp.phone;
        modal.show();
    }

    function resetModal() {
        modalTitle.innerHTML = '<i class="bi bi-person-plus"></i> เพิ่มพนักงาน';
        editKeyInput.value = '';
        inputId.value = '';
        inputName.value = '';
        inputPosition.value = '';
        inputGroup.value = 'ไม่ระบุ';
        inputPhone.value = '';
    }

    // ----- Save (Add or Update) -----
    async function handleSave() {
        const key = editKeyInput.value;
        const id = inputId.value.trim();
        const name = inputName.value.trim();
        const position = inputPosition.value;
        const group = inputGroup.value.trim();
        const phone = inputPhone.value.trim();

        if (!id || !name || !position || !phone) {
            await Swal.fire({
                icon: 'warning',
                title: 'กรุณากรอกข้อมูลให้ครบถ้วน',
                confirmButtonColor: '#4f7df3'
            });
            return;
        }

        const data = { id, name, position, group, phone };

        saveBtn.disabled = true;
        saveBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> กำลังบันทึก...';

        try {
            if (key) {
                await updateEmployee(key, data);
            } else {
                await addEmployee(data);
            }
            modal.hide();
        } catch (err) {
            // Error already handled in functions
        } finally {
            saveBtn.disabled = false;
            saveBtn.innerHTML = '<i class="bi bi-check-lg"></i> บันทึก';
        }
    }

    // ----- Real-time listener -----
    function listenEmployees() {
        onValue(employeesRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                allEmployees = Object.entries(data).map(([key, value]) => ({ key, ...value }));
                syncStatus.className = 'upload-badge synced';
                syncStatus.innerHTML = '<i class="bi bi-check-circle-fill"></i> พร้อมใช้งาน';
                const now = new Date();
                syncTime.textContent = `โหลดข้อมูลล่าสุด ${now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' })}`;
            } else {
                allEmployees = [];
                syncStatus.className = 'upload-badge pending';
                syncStatus.innerHTML = '<i class="bi bi-database"></i> ไม่มีข้อมูล';
                syncTime.textContent = 'กรุณารีเซ็ทพนักงานเพื่อเริ่มต้น';
            }
            filterData();
        }, (error) => {
            console.error('Listener error:', error);
            syncStatus.className = 'upload-badge error';
            syncStatus.innerHTML = '<i class="bi bi-exclamation-triangle-fill"></i> เกิดข้อผิดพลาด';
        });
    }

    // ----- Init -----
    async function init() {
        // Initialize AOS
        AOS.init({
            once: true,
            offset: 50
        });

        // Start real-time listener (will load data and display)
        listenEmployees();

        // Search
        searchInput.addEventListener('input', (e) => {
            currentSearch = e.target.value;
            filterData();
        });

        // Filter badges
        filterGroup.querySelectorAll('.badge-filter').forEach(badge => {
            badge.addEventListener('click', () => {
                filterGroup.querySelectorAll('.badge-filter').forEach(b => b.classList.remove('active'));
                badge.classList.add('active');
                currentFilter = badge.dataset.filter;
                filterData();
            });
        });

        // Modal events
        modalEl.addEventListener('show.bs.modal', (e) => {
            const trigger = e.relatedTarget;
            if (trigger && trigger.classList.contains('edit')) {
                // handled by edit button click
            } else {
                resetModal();
            }
        });

        // Custom edit click handler
        tbody.addEventListener('click', (e) => {
            const editBtn = e.target.closest('.edit');
            if (editBtn) {
                const key = editBtn.dataset.key;
                const emp = allEmployees.find(e => e.key === key);
                if (emp) {
                    openEditModal(emp);
                }
            }
        });

        modalEl.addEventListener('hidden.bs.modal', () => {
            resetModal();
        });

        saveBtn.addEventListener('click', handleSave);

        document.getElementById('employeeForm').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                handleSave();
            }
        });

        document.querySelector('.btn-add').addEventListener('click', () => {
            resetModal();
        });

        // Reset button
        resetBtn.addEventListener('click', resetEmployees);
    }

    init();
</script>
</body>
</html>
