<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Admin Dashboard · SH-CONTACT</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

  <!-- ===== html2pdf สำหรับ Export PDF (รองรับภาษาไทย) ===== -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    /* (คงสไตล์เดิมทั้งหมด) */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Kanit', sans-serif;
      background: #f1f4fa;
      min-height: 100vh;
      padding: 24px 20px;
    }
    .dashboard-wrapper {
      max-width: 1300px;
      margin: 0 auto;
    }
    .admin-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 28px;
      padding: 18px 28px;
      margin-bottom: 28px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
    }
    .admin-header .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .admin-header .brand .icon-box {
      background: linear-gradient(135deg, #4f7df3, #6c5ce7);
      width: 48px;
      height: 48px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: #fff;
      box-shadow: 0 8px 16px -4px rgba(79, 125, 243, 0.35);
    }
    .admin-header .brand h2 {
      font-weight: 700;
      font-size: 1.5rem;
      color: #1a2639;
      margin: 0;
      letter-spacing: -0.3px;
    }
    .admin-header .brand small {
      display: block;
      font-size: 0.75rem;
      font-weight: 400;
      color: #6b7a8f;
      margin-top: -2px;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .header-actions .btn-outline-refresh {
      background: rgba(255, 255, 255, 0.6);
      border: 1.5px solid #e2e8f0;
      border-radius: 14px;
      padding: 8px 18px;
      font-weight: 500;
      font-size: 0.9rem;
      color: #2d3748;
      transition: all 0.2s;
      font-family: 'Kanit', sans-serif;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header-actions .btn-outline-refresh:hover {
      background: #fff;
      border-color: #4f7df3;
      color: #4f7df3;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(79, 125, 243, 0.15);
    }
    .header-actions .btn-danger-soft {
      background: rgba(229, 62, 62, 0.08);
      border: 1.5px solid rgba(229, 62, 62, 0.2);
      border-radius: 14px;
      padding: 8px 18px;
      font-weight: 500;
      font-size: 0.9rem;
      color: #e53e3e;
      transition: all 0.2s;
      font-family: 'Kanit', sans-serif;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header-actions .btn-danger-soft:hover {
      background: rgba(229, 62, 62, 0.15);
      border-color: #e53e3e;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(229, 62, 62, 0.15);
    }
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 20px;
      padding: 18px 20px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
      transition: transform 0.2s;
    }
    .stat-card:hover {
      transform: translateY(-3px);
    }
    .stat-card .stat-number {
      font-size: 2.2rem;
      font-weight: 700;
      line-height: 1.2;
      color: #1a2639;
    }
    .stat-card .stat-label {
      font-size: 0.8rem;
      font-weight: 500;
      color: #6b7a8f;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .stat-card .stat-icon {
      font-size: 1.6rem;
      opacity: 0.3;
      float: right;
    }
    .stat-card.total .stat-number {
      color: #2d3748;
    }
    .stat-card.done .stat-number {
      color: #38a169;
    }
    .stat-card.remain .stat-number {
      color: #e53e3e;
    }
    .stat-card.today .stat-number {
      color: #4f7df3;
    }
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 14px;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 20px;
      padding: 14px 22px;
      margin-bottom: 24px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
    }
    .filter-bar .search-wrap {
      flex: 1;
      min-width: 200px;
      position: relative;
    }
    .filter-bar .search-wrap i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #a0aec0;
      font-size: 1.1rem;
    }
    .filter-bar .search-wrap input {
      width: 100%;
      padding: 10px 16px 10px 44px;
      border-radius: 14px;
      border: 1.5px solid #e2e8f0;
      background: rgba(255, 255, 255, 0.6);
      font-family: 'Kanit', sans-serif;
      font-size: 0.95rem;
      transition: all 0.25s;
      outline: none;
    }
    .filter-bar .search-wrap input:focus {
      border-color: #4f7df3;
      box-shadow: 0 0 0 4px rgba(79, 125, 243, 0.12);
      background: #fff;
    }
    .filter-bar .filter-select {
      padding: 10px 18px;
      border-radius: 14px;
      border: 1.5px solid #e2e8f0;
      background: rgba(255, 255, 255, 0.6);
      font-family: 'Kanit', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.25s;
      min-width: 140px;
      color: #2d3748;
    }
    .filter-bar .filter-select:focus {
      border-color: #4f7df3;
      box-shadow: 0 0 0 4px rgba(79, 125, 243, 0.12);
      background: #fff;
    }
    .filter-bar .clear-filter-btn {
      background: none;
      border: none;
      color: #a0aec0;
      font-size: 1.2rem;
      padding: 0 6px;
      transition: color 0.2s;
      cursor: pointer;
    }
    .filter-bar .clear-filter-btn:hover {
      color: #e53e3e;
    }
    .table-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 28px;
      padding: 20px 0 8px 0;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.06);
      overflow: hidden;
    }
    .table-card .table-header-extra {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 24px 16px 24px;
      flex-wrap: wrap;
      gap: 10px;
      border-bottom: 1.5px solid rgba(0, 0, 0, 0.04);
    }
    .table-card .table-header-extra .left {
      font-weight: 600;
      color: #1a2639;
      font-size: 1.05rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .table-card .table-header-extra .left .badge-count {
      background: #e2e8f0;
      color: #2d3748;
      border-radius: 40px;
      padding: 2px 14px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .table-card .table-header-extra .right {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .table-card .table-header-extra .right .export-btn {
      background: rgba(79, 125, 243, 0.08);
      border: 1.5px solid rgba(79, 125, 243, 0.2);
      border-radius: 12px;
      padding: 6px 16px;
      font-size: 0.85rem;
      font-weight: 500;
      color: #4f7df3;
      font-family: 'Kanit', sans-serif;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      background: transparent;
    }
    .table-card .table-header-extra .right .export-btn:hover {
      background: rgba(79, 125, 243, 0.15);
      border-color: #4f7df3;
      transform: translateY(-1px);
    }
    .table-card .table-header-extra .right .export-btn.copy-btn {
      color: #38a169;
      border-color: rgba(56, 161, 105, 0.3);
      background: rgba(56, 161, 105, 0.06);
    }
    .table-card .table-header-extra .right .export-btn.copy-btn:hover {
      background: rgba(56, 161, 105, 0.12);
      border-color: #38a169;
    }
    .table-card .table-header-extra .right .export-btn.pdf-btn {
      color: #e53e3e;
      border-color: rgba(229, 62, 62, 0.2);
      background: rgba(229, 62, 62, 0.05);
    }
    .table-card .table-header-extra .right .export-btn.pdf-btn:hover {
      background: rgba(229, 62, 62, 0.1);
      border-color: #e53e3e;
    }
    .table-responsive-custom {
      overflow-x: auto;
      padding: 0 4px 4px 4px;
    }
    .table-custom {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
      margin-bottom: 0;
    }
    .table-custom thead th {
      background: rgba(247, 250, 252, 0.6);
      color: #2d3748;
      font-weight: 600;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 14px 16px;
      border-bottom: 2px solid #e2e8f0;
      white-space: nowrap;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .table-custom tbody td {
      padding: 14px 16px;
      vertical-align: middle;
      border-bottom: 1px solid #edf2f7;
      color: #1a2639;
    }
    .table-custom tbody tr {
      transition: background 0.15s;
    }
    .table-custom tbody tr:hover {
      background: rgba(79, 125, 243, 0.04);
    }
    .table-custom tbody tr:last-child td {
      border-bottom: none;
    }
    .table-custom .col-index {
      width: 48px;
      text-align: center;
      font-weight: 500;
      color: #a0aec0;
      font-size: 0.85rem;
    }
    .table-custom .col-name {
      font-weight: 500;
    }
    .table-custom .col-phone {
      font-family: 'Kanit', monospace;
      font-weight: 400;
      letter-spacing: 0.3px;
    }
    .table-custom .col-time {
      font-size: 0.85rem;
      color: #6b7a8f;
      white-space: nowrap;
    }
    .table-custom .col-actions {
      text-align: right;
      white-space: nowrap;
    }
    .table-custom .btn-delete-row {
      background: none;
      border: none;
      color: #a0aec0;
      font-size: 1.2rem;
      padding: 4px 10px;
      border-radius: 10px;
      transition: all 0.2s;
      cursor: pointer;
    }
    .table-custom .btn-delete-row:hover {
      color: #e53e3e;
      background: rgba(229, 62, 62, 0.08);
    }
    .empty-state {
      text-align: center;
      padding: 60px 20px 50px;
      color: #a0aec0;
    }
    .empty-state .big-icon {
      font-size: 4rem;
      display: block;
      margin-bottom: 16px;
      opacity: 0.4;
    }
    .empty-state h5 {
      font-weight: 500;
      color: #4a5568;
    }
    /* responsive */
    @media (max-width: 768px) {
      body { padding: 16px 12px; }
      .admin-header { padding: 14px 18px; flex-direction: column; align-items: stretch; gap: 14px; }
      .admin-header .brand h2 { font-size: 1.2rem; }
      .admin-header .brand .icon-box { width: 40px; height: 40px; font-size: 20px; }
      .header-actions { justify-content: stretch; }
      .header-actions .btn-outline-refresh,
      .header-actions .btn-danger-soft { flex: 1; justify-content: center; font-size: 0.8rem; padding: 8px 12px; }
      .stats-row { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .stat-card .stat-number { font-size: 1.6rem; }
      .stat-card .stat-icon { font-size: 1.2rem; }
      .filter-bar { padding: 12px 16px; flex-direction: column; align-items: stretch; gap: 10px; }
      .filter-bar .search-wrap { min-width: unset; }
      .filter-bar .filter-select { min-width: unset; width: 100%; }
      .table-card { border-radius: 20px; padding: 12px 0 4px 0; }
      .table-card .table-header-extra { padding: 0 16px 12px 16px; flex-direction: column; align-items: flex-start; }
      .table-card .table-header-extra .right { width: 100%; justify-content: flex-start; }
      .table-custom thead th,
      .table-custom tbody td { padding: 10px 12px; font-size: 0.85rem; }
      .table-custom .col-time { font-size: 0.75rem; }
      .table-custom .col-index { width: 32px; font-size: 0.75rem; }
    }
    @media (max-width: 480px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .stat-card { padding: 12px 14px; border-radius: 16px; }
      .stat-card .stat-number { font-size: 1.3rem; }
      .stat-card .stat-label { font-size: 0.65rem; }
      .table-custom thead th,
      .table-custom tbody td { padding: 8px 8px; font-size: 0.78rem; }
      .table-custom .col-actions .btn-delete-row { font-size: 1rem; padding: 2px 6px; }
    }
    .table-responsive-custom::-webkit-scrollbar { height: 4px; }
    .table-responsive-custom::-webkit-scrollbar-track { background: transparent; }
    .table-responsive-custom::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 12px; }
  </style>
</head>
<body>

<div class="dashboard-wrapper">
  <!-- HEADER -->
  <header class="admin-header">
    <div class="brand">
      <div class="icon-box"><i class="bi bi-layout-dashboard"></i></div>
      <div>
        <h2>SH-CONTACT <span style="font-weight:400;font-size:0.9rem;color:#6b7a8f;">Admin</span></h2>
        <small><i class="bi bi-database me-1"></i> Realtime Database</small>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn-outline-refresh" id="refreshBtn"><i class="bi bi-arrow-clockwise"></i> โหลดใหม่</button>
      <button class="btn-danger-soft" id="clearAllBtn"><i class="bi bi-trash3"></i> ล้างทั้งหมด</button>
    </div>
  </header>

  <!-- STATS -->
  <section class="stats-row">
    <div class="stat-card total"><span class="stat-icon"><i class="bi bi-people"></i></span><div class="stat-number" id="statTotal">0</div><div class="stat-label">ทั้งหมด</div></div>
    <div class="stat-card done"><span class="stat-icon"><i class="bi bi-check2-circle"></i></span><div class="stat-number" id="statDone">0</div><div class="stat-label">ส่งแล้ว</div></div>
    <div class="stat-card remain"><span class="stat-icon"><i class="bi bi-hourglass-split"></i></span><div class="stat-number" id="statRemain">0</div><div class="stat-label">คงเหลือ</div></div>
    <div class="stat-card today"><span class="stat-icon"><i class="bi bi-calendar3"></i></span><div class="stat-number" id="statToday">0</div><div class="stat-label">วันนี้</div></div>
  </section>

  <!-- FILTER -->
  <div class="filter-bar">
    <div class="search-wrap"><i class="bi bi-search"></i><input type="text" id="searchInput" placeholder="ค้นหาชื่อหรือเบอร์..." /></div>
    <select class="filter-select" id="filterSelect"><option value="all">ทั้งหมด</option><option value="today">วันนี้</option><option value="yesterday">เมื่อวาน</option><option value="older">เก่ากว่า</option></select>
    <button class="clear-filter-btn" id="clearFilterBtn" title="ล้างตัวกรอง"><i class="bi bi-x-circle"></i></button>
  </div>

  <!-- TABLE -->
  <div class="table-card">
    <div class="table-header-extra">
      <div class="left"><i class="bi bi-list-ul"></i> รายการส่งข้อมูล <span class="badge-count" id="resultCount">0</span></div>
      <div class="right">
        <button class="export-btn pdf-btn" id="exportPdfBtn"><i class="bi bi-filetype-pdf"></i> PDF</button>
        <button class="export-btn" id="exportCsvBtn"><i class="bi bi-filetype-csv"></i> CSV</button>
        <button class="export-btn copy-btn" id="copyListBtn"><i class="bi bi-clipboard"></i> คัดลอกรายชื่อ</button>
      </div>
    </div>
    <div class="table-responsive-custom">
      <table class="table-custom" id="contactTable">
        <thead><tr><th class="col-index">#</th><th class="col-name">ชื่อ</th><th class="col-phone">เบอร์โทร</th><th class="col-time">วันที่ส่ง</th><th class="col-actions">จัดการ</th></tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <div id="emptyState" class="empty-state" style="display:none;"><span class="big-icon"><i class="bi bi-inbox"></i></span><h5>ไม่มีข้อมูล</h5><p style="color:#a0aec0;font-size:0.9rem;">ยังไม่มีรายการส่งข้อมูลในระบบ</p></div>
  </div>
  <div style="text-align:center;margin-top:20px;font-size:0.75rem;color:#a0aec0;letter-spacing:0.3px;"><i class="bi bi-shield-check me-1"></i> ข้อมูลอัปเดตแบบเรียลไทม์ &bull; SH-CONTACT Admin</div>
</div>

<script type="module">
  // ----- Firebase Imports -----
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
  import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";

  // ----- Config -----
  const firebaseConfig = {
    apiKey: "AIzaSyCF8h3mrttJIjUPHwNzYCpzfuDE_ovfT38",
    authDomain: "sh-contact.firebaseapp.com",
    databaseURL: "https://sh-contact-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "sh-contact",
    storageBucket: "sh-contact.firebasestorage.app",
    messagingSenderId: "850820988799",
    appId: "1:850820988799:web:d6ae6674316a1cc749244a"
  };
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // ----- Employees (for remain calc) -----
  const employees = ["สุรศักดิ์ เที่ยงตรง","เสกสรร ตะเพียนทอง","อารียา แสงจันทร์","ปราชญาทิพย์ เนตรโนนหวาย","ปิยนุช ว่าชื่น","ศศิวิมล มาตวงศ์","สิทธิศักดิ์ ใจใส","จงรัก แก้วประดิษฐ์","กรรณิกา ฤทธิณรงค์","สุพิชญา ตาระคำ","นุชนารถ ทัดปอย","ณัฐธิดา บูชาพิมพ์","รุ่งรัตน์ ราชดำเนิน"];

  // ----- DOM refs -----
  const tbody = document.getElementById('tableBody');
  const emptyState = document.getElementById('emptyState');
  const statTotal = document.getElementById('statTotal');
  const statDone = document.getElementById('statDone');
  const statRemain = document.getElementById('statRemain');
  const statToday = document.getElementById('statToday');
  const resultCount = document.getElementById('resultCount');
  const searchInput = document.getElementById('searchInput');
  const filterSelect = document.getElementById('filterSelect');
  const clearFilterBtn = document.getElementById('clearFilterBtn');
  const refreshBtn = document.getElementById('refreshBtn');
  const clearAllBtn = document.getElementById('clearAllBtn');
  const exportCsvBtn = document.getElementById('exportCsvBtn');
  const exportPdfBtn = document.getElementById('exportPdfBtn');
  const copyListBtn = document.getElementById('copyListBtn');

  // ----- State -----
  let allContacts = [];
  let filteredContacts = [];
  let listenerRef = null;

  // ----- Helpers -----
  function formatDate(ts) {
    if (!ts) return '-';
    const d = new Date(ts);
    return d.toLocaleDateString('th-TH', { day:'2-digit', month:'short', year:'numeric' }) +
      ' ' + d.toLocaleTimeString('th-TH', { hour:'2-digit', minute:'2-digit' });
  }
  function isToday(ts) { const d=new Date(ts), n=new Date(); return d.getFullYear()===n.getFullYear() && d.getMonth()===n.getMonth() && d.getDate()===n.getDate(); }
  function isYesterday(ts) { const d=new Date(ts), y=new Date(); y.setDate(y.getDate()-1); return d.getFullYear()===y.getFullYear() && d.getMonth()===y.getMonth() && d.getDate()===y.getDate(); }
  function escapeHtml(text) { if(!text) return ''; const map={'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}; return String(text).replace(/[&<>"']/g, m=>map[m]); }

  // ----- Render -----
  function renderTable(data) {
    if (!data || data.length === 0) {
      tbody.innerHTML = ''; emptyState.style.display = 'block'; resultCount.textContent = '0'; return;
    }
    emptyState.style.display = 'none';
    resultCount.textContent = data.length;
    let html = '';
    data.forEach((item, idx) => {
      html += `<tr data-id="${item.id}">
        <td class="col-index">${idx+1}</td>
        <td class="col-name">${escapeHtml(item.name)}</td>
        <td class="col-phone">${escapeHtml(item.phone)}</td>
        <td class="col-time">${formatDate(item.timestamp)}</td>
        <td class="col-actions"><button class="btn-delete-row" data-id="${item.id}"><i class="bi bi-trash3"></i></button></td>
      </tr>`;
    });
    tbody.innerHTML = html;
    tbody.querySelectorAll('.btn-delete-row').forEach(btn => {
      btn.addEventListener('click', () => { const id=btn.dataset.id; if(id) deleteSingle(id); });
    });
  }

  // ----- Filter Logic -----
  function applyFilters() {
    const search = searchInput.value.trim().toLowerCase();
    const filterVal = filterSelect.value;
    let result = [...allContacts];
    if (search) result = result.filter(item => item.name.toLowerCase().includes(search) || item.phone.includes(search));
    if (filterVal === 'today') result = result.filter(item => isToday(item.timestamp));
    else if (filterVal === 'yesterday') result = result.filter(item => isYesterday(item.timestamp));
    else if (filterVal === 'older') { const y=new Date(); y.setDate(y.getDate()-1); result = result.filter(item => new Date(item.timestamp) < y); }
    filteredContacts = result;
    renderTable(result);
    updateStats();
  }

  // ----- Update Stats -----
  function updateStats() {
    const total = allContacts.length;
    const done = allContacts.length;
    const remain = Math.max(0, employees.length - done);
    const todayCount = allContacts.filter(item => isToday(item.timestamp)).length;
    statTotal.textContent = total;
    statDone.textContent = done;
    statRemain.textContent = remain;
    statToday.textContent = todayCount;
  }

  // ----- Firebase Listener -----
  function startListening() {
    if (listenerRef) { listenerRef(); listenerRef = null; }
    const contactsRef = ref(db, 'contacts');
    const off = onValue(contactsRef, (snapshot) => {
      const data = [];
      if (snapshot.exists()) {
        snapshot.forEach(child => {
          const val = child.val();
          data.push({ id: child.key, name: val.name || 'ไม่ระบุชื่อ', phone: val.phone || '-', timestamp: val.timestamp || Date.now() });
        });
      }
      data.sort((a,b) => (b.timestamp||0) - (a.timestamp||0));
      allContacts = data;
      applyFilters();
      updateStats();
    }, (error) => {
      console.error('onValue error:', error);
      Swal.fire({ icon:'error', title:'ไม่สามารถโหลดข้อมูลได้', text:error.message, confirmButtonColor:'#e53e3e' });
    });
    listenerRef = off;
  }

  // ----- Delete Single -----
  async function deleteSingle(id) {
    const confirm = await Swal.fire({ title:'ยืนยันการลบ', text:'คุณต้องการลบรายการนี้ใช่หรือไม่?', icon:'warning', showCancelButton:true, confirmButtonColor:'#e53e3e', cancelButtonColor:'#a0aec0', confirmButtonText:'ใช่, ลบเลย', cancelButtonText:'ยกเลิก' });
    if (!confirm.isConfirmed) return;
    try { await remove(ref(db, `contacts/${id}`)); Swal.fire({ icon:'success', title:'ลบสำเร็จ', timer:1200, showConfirmButton:false }); }
    catch(err) { Swal.fire({ icon:'error', title:'ลบไม่สำเร็จ', text:err.message, confirmButtonColor:'#e53e3e' }); }
  }

  // ----- Clear All -----
  async function clearAll() {
    if (allContacts.length === 0) { Swal.fire({ icon:'info', title:'ไม่มีข้อมูล', text:'ไม่พบรายการที่จะลบ', confirmButtonColor:'#4f7df3' }); return; }
    const confirm = await Swal.fire({ title:'⚠️ ล้างข้อมูลทั้งหมด?', html:`คุณกำลังจะลบ <strong>${allContacts.length}</strong> รายการ อย่างถาวร`, icon:'error', showCancelButton:true, confirmButtonColor:'#e53e3e', cancelButtonColor:'#a0aec0', confirmButtonText:'ใช่, ล้างทั้งหมด', cancelButtonText:'ยกเลิก' });
    if (!confirm.isConfirmed) return;
    try { await remove(ref(db, 'contacts')); Swal.fire({ icon:'success', title:'ล้างข้อมูลทั้งหมดแล้ว', timer:1500, showConfirmButton:false }); }
    catch(err) { Swal.fire({ icon:'error', title:'เกิดข้อผิดพลาด', text:err.message, confirmButtonColor:'#e53e3e' }); }
  }

  // ----- Export CSV (ทั้งหมด) -----
  function exportCsv() {
    if (allContacts.length === 0) { Swal.fire({ icon:'info', title:'ไม่มีข้อมูล', text:'ไม่พบข้อมูลสำหรับส่งออก', confirmButtonColor:'#4f7df3' }); return; }
    const rows = [['ลำดับ','ชื่อ','เบอร์โทร','วันที่ส่ง']];
    allContacts.forEach((item,idx) => rows.push([idx+1, item.name, item.phone, formatDate(item.timestamp)]));
    const csvContent = rows.map(row => row.join(',')).join('\n');
    const blob = new Blob(['\uFEFF' + csvContent], { type:'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `contacts_${new Date().toISOString().slice(0,10)}.csv`;
    document.body.appendChild(link); link.click(); document.body.removeChild(link);
    URL.revokeObjectURL(link.href);
  }

  // ----- Export PDF (ใช้ html2pdf รองรับภาษาไทย) -----
  function exportPdf() {
    if (allContacts.length === 0) {
      Swal.fire({ icon:'info', title:'ไม่มีข้อมูล', text:'ไม่พบข้อมูลสำหรับสร้าง PDF', confirmButtonColor:'#4f7df3' });
      return;
    }

    // สร้าง element ชั่วคราวสำหรับแปลงเป็น PDF
    const element = document.createElement('div');
    element.style.padding = '20px';
    element.style.fontFamily = "'Kanit', sans-serif";
    element.style.backgroundColor = '#ffffff';
    element.style.color = '#1a2639';
    element.innerHTML = `
      <h2 style="text-align:center; font-weight:600; margin-bottom:8px;">รายงานการส่งข้อมูล (SH-CONTACT)</h2>
      <p style="text-align:center; margin-bottom:4px;">วันที่ส่งออก: ${new Date().toLocaleString('th-TH')}</p>
      <p style="text-align:center; margin-bottom:20px;">จำนวนรายการทั้งหมด: ${allContacts.length} รายการ</p>
      <table style="width:100%; border-collapse: collapse; font-size:14px;">
        <thead>
          <tr style="background:#4f7df3; color:#ffffff;">
            <th style="padding:10px 8px; border:1px solid #ccc; text-align:center;">ลำดับ</th>
            <th style="padding:10px 8px; border:1px solid #ccc; text-align:left;">ชื่อ</th>
            <th style="padding:10px 8px; border:1px solid #ccc; text-align:left;">เบอร์โทร</th>
            <th style="padding:10px 8px; border:1px solid #ccc; text-align:left;">วันที่ส่ง</th>
          </tr>
        </thead>
        <tbody>
          ${allContacts.map((item, idx) => `
            <tr>
              <td style="padding:8px 8px; border:1px solid #ccc; text-align:center;">${idx+1}</td>
              <td style="padding:8px 8px; border:1px solid #ccc;">${item.name}</td>
              <td style="padding:8px 8px; border:1px solid #ccc;">${item.phone}</td>
              <td style="padding:8px 8px; border:1px solid #ccc;">${formatDate(item.timestamp)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
    document.body.appendChild(element);

    // ใช้ html2pdf แปลง element เป็น PDF
    html2pdf()
      .set({
        margin: 10,
        filename: `contacts_${new Date().toISOString().slice(0,10)}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true, letterRendering: true },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
      })
      .from(element)
      .save()
      .then(() => {
        document.body.removeChild(element);
      })
      .catch((err) => {
        document.body.removeChild(element);
        console.error(err);
        Swal.fire({ icon:'error', title:'สร้าง PDF ไม่สำเร็จ', text:'กรุณาลองใหม่อีกครั้ง', confirmButtonColor:'#e53e3e' });
      });
  }

  // ----- คัดลอกรายชื่อ + เบอร์ (เฉพาะรายการที่กรองอยู่) -----
  async function copyNamePhoneList() {
    const listToCopy = filteredContacts.length > 0 ? filteredContacts : allContacts;
    if (listToCopy.length === 0) {
      Swal.fire({ icon:'info', title:'ไม่มีข้อมูล', text:'ไม่พบรายชื่อที่จะคัดลอก', confirmButtonColor:'#4f7df3' });
      return;
    }
    const text = listToCopy.map(item => `${item.name} : ${item.phone}`).join('\n');
    try {
      await navigator.clipboard.writeText(text);
      Swal.fire({
        icon: 'success',
        title: 'คัดลอกสำเร็จ!',
        text: `คัดลอกรายชื่อ ${listToCopy.length} รายการ ไปยังคลิปบอร์ดแล้ว`,
        timer: 2000,
        showConfirmButton: false
      });
    } catch {
      // fallback
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      Swal.fire({
        icon: 'success',
        title: 'คัดลอกสำเร็จ!',
        text: `คัดลอกรายชื่อ ${listToCopy.length} รายการ (แบบสำรอง)`,
        timer: 2000,
        showConfirmButton: false
      });
    }
  }

  // ----- Event Listeners -----
  searchInput.addEventListener('input', applyFilters);
  filterSelect.addEventListener('change', applyFilters);
  clearFilterBtn.addEventListener('click', () => { searchInput.value = ''; filterSelect.value = 'all'; applyFilters(); });
  refreshBtn.addEventListener('click', () => {
    Swal.fire({ icon:'info', title:'กำลังโหลดข้อมูล...', timer:800, showConfirmButton:false, didOpen:()=>{ if(listenerRef){ listenerRef(); listenerRef=null; } startListening(); } });
  });
  clearAllBtn.addEventListener('click', clearAll);
  exportCsvBtn.addEventListener('click', exportCsv);
  exportPdfBtn.addEventListener('click', exportPdf);
  copyListBtn.addEventListener('click', copyNamePhoneList);

  // ----- Start -----
  startListening();

  // Auto reconnect check
  setInterval(() => { if (!listenerRef) startListening(); }, 60000);
  console.log('✅ Admin Dashboard started — PDF now supports Thai fonts (html2pdf)');
</script>
</body>
</html>
